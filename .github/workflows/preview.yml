name: 🌐 Build & Preview mit HTML Lint

on:
  push:
    branches: [preview]

jobs:
  test:
    name: ✅ HTML-Dateien prüfen
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Repository klonen
        uses: actions/checkout@v3

      - name: 🔍 HTMLhint installieren
        run: npm install -g htmlhint

      - name: 🔍 HTML-Dateien prüfen
        run: htmlhint index.html || exit 1

  deploy:
    name: 🚀 Preview Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Repository klonen
        uses: actions/checkout@v3

      - name: 🏗️ Baue statische Seite
        run: |
          mkdir public
          cp index.html public/index.html

      - name: 🚀 Deploy mit GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: preview

