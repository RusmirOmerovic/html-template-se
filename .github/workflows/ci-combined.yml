# .github/workflows/ci-clean.yml
name: 🚀 Minimaler CI Build + Formatcheck

on:
  push:
    branches: [main, testing, develop]

jobs:
  build:
    name: 🔍 Build-Check + Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ✨ Format-Check mit Prettier
        run: npx prettier --check "**/*.{js,jsx,ts,tsx,css,scss,html}"
